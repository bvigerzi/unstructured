name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout content
        uses: actions/checkout@v4
        with:
          repository: bvigerzi/unstructured-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          ref: main
          path: _content

      - name: Copy content into site
        run: |
          mkdir -p src/content/posts
          cp -r _content/posts/* src/content/posts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Deploy to Bunny.net
        if: github.ref == 'refs/heads/main'
        uses: R-J-dev/bunny-deploy@ae25fa670b732ffc8dba84c872fb203d2a365229 # v3.0.0
        with:
          directory-to-upload: "dist"
          target-directory: "/"
          storage-endpoint: "https://storage.bunnycdn.com"
          storage-zone-name: "unstructured-fyi"
          storage-zone-password: "${{ secrets.BUNNY_STORAGE_PASSWORD }}"
          access-key: "${{ secrets.BUNNY_API_KEY }}"
          pull-zone-id: "5487806"
          concurrency: "10"
          replication-timeout: "15000"
          request-timeout: "5000"
          retry-limit: "3"
          enable-delete-action: "true"
          enable-purge-pull-zone: "true"
